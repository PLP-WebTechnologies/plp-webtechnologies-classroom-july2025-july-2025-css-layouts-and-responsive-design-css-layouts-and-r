<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Multi-Section Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Responsive Webpage</h1>
    </header>

    <!-- Navigation (Flexbox example) -->
    <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Main content area (Grid example) -->
    <main class="main-grid">
        <section class="content">
            <h2>Main Content</h2>
            <p>This is the main content area.</p>
        </section>
        <aside class="sidebar">
            <h2>Sidebar</h2>
            <p>Additional info or links go here.</p>
        </aside>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 My Responsive Webpage</p>
    </footer>

</body>
</html>
