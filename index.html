<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Logo</div>
        <nav class="nav-menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="grid-container">
        <section class="content">
            <h1>Main Content</h1>
            <p>This is the main content area. On desktop, this will be next to the sidebar. On mobile, it will take up the full width.</p>
        </section>

        <aside class="sidebar">
            <h2>Sidebar</h2>
            <p>This is the sidebar. It might contain links or extra information.</p>
        </aside>
    </main>

    <footer>
        <p>&copy; 2025 Responsive Webpage</p>
    </footer>
</body>
</html>
